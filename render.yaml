databases:
  - name: managerahub-db
    plan: free
    databaseName: managerahub
    user: managerahub

services:
  - type: web
    name: managerahub
    runtime: python
    plan: free
    buildCommand: ./build.sh
    preDeployCommand: python3 manage.py migrate
    startCommand: python3 -m gunicorn monprojet.wsgi:application --log-file -
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: managerahub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: WEB_CONCURRENCY
        value: "4"
