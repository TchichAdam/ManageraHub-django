{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | ManageraHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/main.css' %}?v=20260601-premium-v11">
</head>
<body class="admin-auth-body">
    <main class="admin-auth-page">
        <div class="admin-auth-overlay"></div>
        <section class="admin-auth-card">
            <div class="admin-auth-copy">
                <span class="admin-auth-kicker">ManageraHub Admin</span>
                <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;">
                    <h1 style="margin:0;">Welcome Admin</h1>
                    <button type="button" onclick="autofillAdmin()" class="admin-auth-submit" style="background:#5a5d4a; border-color:#8c907d; color:#fff; cursor:pointer; padding:4px 10px; font-size:0.7rem; transition: background 0.15s; height: 28px; border-radius: 999px; width: auto; margin: 0;">✨ Demo Autofill</button>
                </div>
                <p style="margin-top: 8px;">Sign in to access the ManageraHub admin dashboard</p>
            </div>

            <form method="post" action="/admin/login" class="admin-auth-form">
                {% csrf_token %}
                {% if error_message %}
                <div class="admin-auth-error">{{ error_message }}</div>
                {% endif %}

                <label class="admin-auth-field">
                    <span>Email</span>
                    <input type="email" name="email" placeholder="Enter your admin email" required>
                </label>

                <label class="admin-auth-field">
                    <span>Password</span>
                    <input type="password" name="password" placeholder="Enter your password" required>
                </label>

                <button type="submit" class="admin-auth-submit">Login</button>
                <a href="/" class="admin-auth-secondary">Back to website</a>
            </form>
        </section>
    </main>
    <script>
        function autofillAdmin() {
            document.querySelector('input[name="email"]').value = "admin@managerahub.ma";
            document.querySelector('input[name="password"]').value = "Admin12345678";
        }
    </script>
</body>
</html>
